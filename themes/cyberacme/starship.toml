[git_status]
style = "bg:#6D7CFF fg:#EAFCFF"
format = "[ $all_status$ahead_behind ]($style)"

[python]
symbol = "ÓąĶ "
style = "bg:#0F2530 fg:#7DF9FF"
format = "[ $symbol$virtualenv ]($style)"

[nodejs]
symbol = "Óúė "
style = "bg:#0F2530 fg:#7DF9FF"
format = "[ $symbol$version ]($style)"

[time]
disabled = false
time_format = "%R"
style = "bg:#0F2530 fg:#7DF9FF"
format = "[ Ôźļ $time ]($style)"

[character]
