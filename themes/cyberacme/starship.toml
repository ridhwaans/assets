[hostname]
ssh_only = false
style = "bg:#33BBFF fg:#07141C"
format = "[ $hostname ]($style)"

[directory]
style = "bg:#33BBFF fg:#07141C"
format = "[ $path ]($style)"
truncation_length = 4
truncation_symbol = "‚Ä¶/"

[git_branch]
symbol = "ůįė¨ "
style = "bg:#6D7CFF fg:#EAFCFF"
