\n$character"""

[directory]
style = "bg:#195465 fg:#D3EBE9"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "‚Ä¶/"

[git_branch]
symbol = "Ôźė "
style = "bg:#4E5165 fg:#D3EBE9"
format = "[ $symbol$branch ]($style)"

[git_status]
style = "bg:#4E5165 fg:#D3EBE9"
format = "[ $all_status$ahead_behind ]($style)"

[python]
symbol = "ÓąĶ "
style = "bg:#10151B fg:#98D1CE"
format = "[ $symbol$virtualenv ]($style)"

[nodejs]
symbol = "Óúė "
style = "bg:#10151B fg:#98D1CE"
format = "[ $symbol$version ]($style)"

[time]
disabled = false
time_format = "%R"
style = "bg:#10151B fg:#98D1CE"
format = "[ Ôźļ $time ]($style)"

[character]
success_symbol = "[‚ĚĮ](bold fg:#33859D)"
error_symbol = "[‚ĚĮ](bold fg:#C33027)"
