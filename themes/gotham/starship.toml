"$schema" = "https://starship.rs/config-schema.json"

format = """
[Óā∂](fg:#33859D)\
[GOTHAM](bg:#33859D fg:#0A0F14 bold)\
[Óāį](fg:#33859D bg:#195465)\
$directory\
[Óāį](fg:#195465 bg:#4E5165)\
